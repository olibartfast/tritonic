name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          find include src tests -type f \( -name '*.cpp' -o -name '*.hpp' \) | \
            xargs clang-format --dry-run --Werror

  clang-tidy:
    name: Clang-Tidy
    runs-on: ubuntu-latest
    env:
      TritonClientBuild_DIR: ${{ github.workspace }}/triton_client_libs/install
    steps:
      - uses: actions/checkout@v4

      - name: Cache Triton Client Libraries
        id: cache-triton
        uses: actions/cache@v4
        with:
          path: triton_client_libs
          key: triton-client-r25.06-${{ runner.os }}

      - name: Extract Triton Client Libraries
        if: steps.cache-triton.outputs.cache-hit != 'true'
        run: |
          chmod +x docker/scripts/extract_triton_libs.sh
          ./docker/scripts/extract_triton_libs.sh

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-tidy \
            cmake \
            libcurl4-openssl-dev \
            libopencv-dev \
            libprotobuf-dev \
            protobuf-compiler \
            rapidjson-dev

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Generate compile_commands.json
        run: cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Run clang-tidy
        run: |
          find src -type f -name '*.cpp' | \
            xargs clang-tidy -p build --header-filter='^(include|src)/'

  cppcheck:
    name: Cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning --std=c++20 --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --suppress=virtualCallInConstructor \
            -I include src/

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      TritonClientBuild_DIR: ${{ github.workspace }}/triton_client_libs/install
    steps:
      - uses: actions/checkout@v4

      - name: Cache Triton Client Libraries
        id: cache-triton
        uses: actions/cache@v4
        with:
          path: triton_client_libs
          key: triton-client-r25.06-${{ runner.os }}

      - name: Extract Triton Client Libraries
        if: steps.cache-triton.outputs.cache-hit != 'true'
        run: |
          chmod +x docker/scripts/extract_triton_libs.sh
          ./docker/scripts/extract_triton_libs.sh

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libcurl4-openssl-dev \
            libgmock-dev \
            libgtest-dev \
            libopencv-dev \
            libprotobuf-dev \
            protobuf-compiler \
            rapidjson-dev

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTING=ON -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  build-warnings:
    name: Build with Strict Warnings
    runs-on: ubuntu-latest
    env:
      TritonClientBuild_DIR: ${{ github.workspace }}/triton_client_libs/install
    steps:
      - uses: actions/checkout@v4

      - name: Cache Triton Client Libraries
        id: cache-triton
        uses: actions/cache@v4
        with:
          path: triton_client_libs
          key: triton-client-r25.06-${{ runner.os }}

      - name: Extract Triton Client Libraries
        if: steps.cache-triton.outputs.cache-hit != 'true'
        run: |
          chmod +x docker/scripts/extract_triton_libs.sh
          ./docker/scripts/extract_triton_libs.sh

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libcurl4-openssl-dev \
            libopencv-dev \
            libprotobuf-dev \
            protobuf-compiler \
            rapidjson-dev

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Configure with -DTRITONIC_STRICT_WARNINGS=ON
        run: cmake -S . -B build -DTRITONIC_STRICT_WARNINGS=ON -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel
