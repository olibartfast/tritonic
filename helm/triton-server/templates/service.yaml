apiVersion: v1
kind: Service
metadata:
  name: {{ include "triton-server.fullname" . }}-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "triton-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.ports.http }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.ports.grpc }}
      targetPort: grpc
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.ports.metrics }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "triton-server.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "triton-server.fullname" . }}-service-nodeport
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "triton-server.labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - name: http
      port: {{ .Values.service.ports.http }}
      targetPort: http
      nodePort: {{ .Values.service.nodePort.http }}
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.ports.grpc }}
      targetPort: grpc
      nodePort: {{ .Values.service.nodePort.grpc }}
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.ports.metrics }}
      targetPort: metrics
      nodePort: {{ .Values.service.nodePort.metrics }}
      protocol: TCP
  selector:
    {{- include "triton-server.selectorLabels" . | nindent 4 }}
