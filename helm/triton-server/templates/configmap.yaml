apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "triton-server.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "triton-server.labels" . | nindent 4 }}
data:
  TRITON_SERVER_ARGS: "{{ join " " .Values.server.args }}"
  MODEL_REPOSITORY_PATH: "{{ .Values.server.modelRepository.path }}"
